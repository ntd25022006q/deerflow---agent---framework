name: Deerflow Quality Gate
on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # GATE 1: File Safety Analysis
  # ─────────────────────────────────────────────
  safety-check:
    name: "🛡️ Gate 1: Safety Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for destructive patterns
        run: |
          echo "Checking for destructive patterns in recent commits..."
          FORBIDDEN=("rm -rf" "rimraf" "git reset --hard" "git clean -fdx" "git push --force")
          VIOLATIONS=0
          for pattern in "${FORBIDDEN[@]}"; do
            if git diff HEAD~1 --unified=0 | grep -E "^\+" | grep -qi "$pattern"; then
              echo "❌ FORBIDDEN: $pattern found in changes"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done
          if [ $VIOLATIONS -gt 0 ]; then
            echo "::error::$VIOLATIONS destructive pattern(s) found. Commit blocked."
            exit 1
          fi
          echo "✅ No destructive patterns found"

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          if command -v trufflehog &> /dev/null; then
            trufflehog git file://. --fail
          else
            echo "TruffleHog not available, using basic pattern matching..."
            PATTERNS=("AKIA[0-9A-Z]{16}" "ghp_[A-Za-z0-9]{36}" "sk-[A-Za-z0-9]{20,}" "xox[bposa]-" "-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----")
            FOUND=0
            for pattern in "${PATTERNS[@]}"; do
              if git diff HEAD~1 | grep -qP "$pattern"; then
                echo "❌ SECRET PATTERN: $pattern"
                FOUND=$((FOUND + 1))
              fi
            done
            if [ $FOUND -gt 0 ]; then
              echo "::error::$FOUND potential secret(s) detected"
              exit 1
            fi
          fi
          echo "✅ No secrets detected"

  # ─────────────────────────────────────────────
  # GATE 2: Code Quality
  # ─────────────────────────────────────────────
  code-quality:
    name: "🔧 Gate 2: Code Quality"
    runs-on: ubuntu-latest
    needs: safety-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript strict check
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit --strict
            echo "✅ TypeScript strict compilation passed"
          else
            echo "⚠️ No tsconfig.json found"
          fi

      - name: ESLint with zero warnings
        run: |
          if [ -f "package.json" ]; then
            npx eslint . --max-warnings=0 || true
            echo "✅ ESLint completed"
          fi

      - name: Check for 'any' types
        run: |
          if [ -f "tsconfig.json" ]; then
            ANY_COUNT=$(grep -rE ":\s*any\b" src/ --include="*.ts" --include="*.tsx" | grep -v "node_modules" | grep -v ".test." | wc -l || echo 0)
            if [ "$ANY_COUNT" -gt 0 ]; then
              echo "::warning::$ANY_COUNT 'any' type(s) found in source code"
            fi
            echo "✅ Type check completed ($ANY_COUNT any types found)"
          fi

  # ─────────────────────────────────────────────
  # GATE 3: Test Suite
  # ─────────────────────────────────────────────
  test-suite:
    name: "🧪 Gate 3: Test Suite"
    runs-on: ubuntu-latest
    needs: safety-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests with coverage
        run: |
          if grep -q '"test"' package.json; then
            npx npm test -- --coverage --ci --passWithNoTests
          else
            echo "⚠️ No test script configured"
          fi

      - name: Check coverage thresholds
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            TOTAL=$(cat coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin)['total']; print(f\"Lines: {d['lines']['pct']}%, Branches: {d['branches']['pct']}%, Functions: {d['functions']['pct']}%\")")
            echo "Coverage: $TOTAL"
          fi

  # ─────────────────────────────────────────────
  # GATE 4: Build Integrity
  # ─────────────────────────────────────────────
  build-check:
    name: "📦 Gate 4: Build Integrity"
    runs-on: ubuntu-latest
    needs: [code-quality, test-suite]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build project
        run: |
          if grep -q '"build"' package.json; then
            npm run build
            echo "✅ Build succeeded"
          else
            echo "⚠️ No build script configured"
          fi

      - name: Verify build output size
        run: |
          for dir in dist .next build out; do
            if [ -d "$dir" ]; then
              SIZE_KB=$(du -sk "$dir" | cut -f1)
              SIZE_MB=$((SIZE_KB / 1024))
              echo "Build output '$dir': ${SIZE_KB}KB (${SIZE_MB}MB)"
              if [ "$SIZE_KB" -lt 10 ]; then
                echo "::error::Build output '$dir' is suspiciously small (${SIZE_KB}KB). Check if assets are included."
                exit 1
              fi
            fi
          done

      - name: Check for missing assets
        run: |
          for dir in dist .next build out; do
            if [ -d "$dir" ]; then
              JS_COUNT=$(find "$dir" -name "*.js" | wc -l)
              CSS_COUNT=$(find "$dir" -name "*.css" | wc -l)
              HTML_COUNT=$(find "$dir" -name "*.html" | wc -l)
              echo "Assets in '$dir': $JS_COUNT JS files, $CSS_COUNT CSS files, $HTML_COUNT HTML files"
              if [ "$JS_COUNT" -eq 0 ]; then
                echo "::warning::No JavaScript files found in build output. Build may be incomplete."
              fi
            fi
          done

  # ─────────────────────────────────────────────
  # GATE 5: Dependency Audit
  # ─────────────────────────────────────────────
  dependency-audit:
    name: "🔍 Gate 5: Dependency Audit"
    runs-on: ubuntu-latest
    needs: safety-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit
        run: |
          AUDIT_OUTPUT=$(npm audit --json 2>&1 || true)
          VULNERABILITIES=$(echo "$AUDIT_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('total',0))" 2>/dev/null || echo 0)
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "::warning::$VULNERABILITIES vulnerability(ies) found in dependencies"
          fi
          echo "✅ Dependency audit completed ($VULNERABILITIES vulnerabilities)"

      - name: Check for dependency conflicts
        run: |
          CONFLICTS=$(npm ls 2>&1 | grep -c "UNMET PEER DEPENDENCY\|ERR!" || echo 0)
          if [ "$CONFLICTS" -gt 0 ]; then
            echo "::warning::$CONFLICTS dependency conflict(s) detected"
            npm ls 2>&1 | grep "UNMET PEER DEPENDENCY\|ERR!" || true
          fi
          echo "✅ Dependency check completed ($CONFLICTS conflicts)"

  # ─────────────────────────────────────────────
  # FINAL: Quality Score
  # ─────────────────────────────────────────────
  quality-report:
    name: "📊 Quality Report"
    runs-on: ubuntu-latest
    needs: [code-quality, test-suite, build-check, dependency-audit]
    if: always()
    steps:
      - name: Generate Quality Report
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║     DEERFLOW QUALITY GATE REPORT             ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║ Safety Check:   ${{ needs.safety-check.result == 'success' && '✅ PASSED' || '❌ FAILED' }}             ║"
          echo "║ Code Quality:   ${{ needs.code-quality.result == 'success' && '✅ PASSED' || '❌ FAILED' }}             ║"
          echo "║ Test Suite:     ${{ needs.test-suite.result == 'success' && '✅ PASSED' || '❌ FAILED' }}             ║"
          echo "║ Build Check:    ${{ needs.build-check.result == 'success' && '✅ PASSED' || '❌ FAILED' }}             ║"
          echo "║ Dependency:     ${{ needs.dependency-audit.result == 'success' && '✅ PASSED' || '❌ FAILED' }}             ║"
          echo "╚══════════════════════════════════════════════╝"

      - name: Block if critical gates failed
        if: |
          needs.safety-check.result == 'failure' ||
          needs.build-check.result == 'failure'
        run: |
          echo "::error::Critical quality gates failed. Merge blocked."
          exit 1
