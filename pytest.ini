# Deerflow Agent Framework — Test Configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: marks tests that require git operations (deselect with '-m "not integration"')
    slow: marks tests that are slow running
